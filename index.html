<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Material 3 Expressive Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
  
  <!-- Main Content -->
  <main class="container my-5 p-4 text-center flex-grow-1 d-flex flex-column justify-content-center" style="max-width: 400px;">
    <h2 class="fs-2 fw-bold mb-5 text-dark">
      Material 3 Expressive Demo
    </h2>
    
    <div id="centeredBox" class="expressive-box mx-auto d-flex justify-content-center align-items-center fs-5">
      I am centered!
    </div>
    
    <div class="mt-5 d-grid gap-3">
      <button id="recenterBtn" class="btn btn-expressive">Re-center box</button>
      <button id="rephraseBtn" class="btn btn-expressive">✨ Rephrase Centered Text</button>
      <button id="affirmationBtn" class="btn btn-expressive">✨ Generate Centering Affirmation</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="mt-auto w-100 py-4 text-center">
    <div class="d-flex justify-content-center align-items-center gap-3 mb-2 text-muted">
      <i class="bi bi-code-slash fs-5"></i>
      <i class="bi bi-heart-fill text-danger fs-5"></i>
      <i class="bi bi-globe fs-5"></i>
    </div>
    <span class="badge rounded-pill footer-badge">
      📛 Made by Dvibe Studio
    </span>
  </footer>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
